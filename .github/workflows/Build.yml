name: Build Pansou
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - name: Build
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -v -o pansou main.go
      - uses: actions/upload-artifact@v4
        with:
          name: pansou-linux
          path: pansou
